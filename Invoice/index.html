<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div id="InvPage">

  <!-- ===================== -->
  <!-- 1. My Info Section    -->
  <!-- ===================== -->
  <div id="MyInfo" class="section two-col">
  <h2>My Details</h2>

  <div class="row">
    <div>
      <label>Name</label>
      <input type="text" id="my_name">
    </div>
    <div>
      <label>ABN</label>
      <input type="text" id="my_abn">
    </div>
  </div>

  <div class="row">
    <div>
      <label>Email</label>
      <input type="email" id="my_email">
    </div>
    <div>
      <label>Phone</label>
      <input type="text" id="my_phone">
    </div>
  </div>

  <div class="row full">
    <label>Address</label>
    <input type="text" id="my_address">
  </div>
</div>

<!-- ===================== -->
  <!-- 2. Customer Info       -->
  <!-- ===================== -->
<div id="CustInfo" class="section two-col">
  <h2>Customer Details</h2>

  <div class="row">
    <div>
      <label>Name</label>
      <input type="text" id="cust_name">
    </div>
    <div>
      <label>Company</label>
      <input type="text" id="cust_company">
    </div>
  </div>

  <div class="row">
    <div>
      <label>Email</label>
      <input type="email" id="cust_email">
    </div>
    <div>
      <label>Phone</label>
      <input type="text" id="cust_phone">
    </div>
  </div>

  <div class="row full">
    <label>Address</label>
    <input type="text" id="cust_address">
  </div>
</div>

  <!-- ===================== -->
  <!-- 3. Line Items Table    -->
  <!-- ===================== -->
  <div id="LineItems" class="section">
    <h2>Line Items</h2>

    <table>
      <thead>
        <tr>
          <th class="qty">Qty</th>
          <th class="desc">Description</th>
          <th class="rate">Rate</th>
          <th class="total">Total</th>
        </tr>
      </thead>

      <tbody id="itemRows">
        <tr>
          <td><input type="number" class="qtyField"></td>
          <td><textarea class="descField"></textarea></td>
          <td><input type="number" class="rateField"></td>
          <td><input type="number" class="totalField" readonly></td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="3" class="right">Subtotal</td>
          <td><input type="number" id="subtotal" readonly></td>
        </tr>
        <tr>
          <td colspan="3" class="right">GST</td>
          <td><input type="number" id="gst" readonly></td>
        </tr>
        <tr>
          <td colspan="3" class="right"><strong>Total</strong></td>
          <td><input type="number" id="grand_total" readonly></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <!-- ===================== -->
  <!-- 4. Footer (Payment)   -->
  <!-- ===================== -->
  <div id="Footer" class="pay-row">
  <h2>Payment Details</h2>

  <div class="row">
    <div>
      <label>BSB</label>
      <input type="text" id="bsb">
    </div>
    <div>
      <label>Account Number</label>
      <input type="text" id="acct_num">
    </div>
    <div>
      <label>Account Name</label>
      <input type="text" id="acct_name">
    </div>
  </div>
  </div>

</div>

</body>
</html>
